# CRTracker CI/CD Pipeline
# Builds Docker images, pushes to registry, and deploys to K3s via Tailscale

name: Build and Deploy CRTracker

on:
  push:
    branches:
      - main
      - recette
  workflow_dispatch:

env:
  REGISTRY: registry.necsus.dev
  BACKEND_IMAGE: registry.necsus.dev/crtracker/backend
  FRONTEND_IMAGE: registry.necsus.dev/crtracker/frontend
  KUBECONFIG_PATH: /tmp/kubeconfig-crtracker

jobs:
  # ============================================================
  # JOB 1: Build and Push Docker Images
  # ============================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Image digest output
        run: |
          echo "Backend pushed!"
          echo "Frontend pushed!"

  # ============================================================
  # JOB 2: Deploy to Kubernetes (K3s)
  # ============================================================
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # TAILSKALE CONNECTION TO CLUSTER
      # ============================================================
      - name: Connect to K3s via Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: ci:crtracker
          timeout: 10m

      - name: Verify Tailscale connection
        run: |
          tailscale ip -4
          echo "Connected to Tailscale network"

      # ============================================================
      # KUBECTL CONFIGURATION
      # ============================================================
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Setup kubeconfig
        run: |
          mkdir -p $(dirname ${{ env.KUBECONFIG_PATH }})
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ${{ env.KUBECONFIG_PATH }}
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}

      - name: Verify cluster connection
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl cluster-info
          kubectl get nodes

      # ============================================================
      # KUBERNETES DEPLOYMENT
      # ============================================================
      - name: Create namespace
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl apply -f k8s/namespace.yaml

      - name: Create Docker registry secret
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl delete secret registry-credentials -n crtracker --ignore-not-found
          kubectl create secret docker-registry registry-credentials \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            -n crtracker

      - name: Create application secrets
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl apply -f k8s/secrets-template.yaml

      - name: Deploy Kubernetes manifests
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml

      - name: Run database migrations
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl delete job db-migrate -n crtracker --ignore-not-found
          kubectl apply -f k8s/db-init-job.yaml
          kubectl wait --for=condition=complete --timeout=120s job/db-migrate -n crtracker

      - name: Wait for deployment rollout
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          kubectl rollout status deployment/backend -n crtracker --timeout=300s
          kubectl rollout status deployment/frontend -n crtracker --timeout=180s

      - name: Verify deployment
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          echo "=== Backend Pods ==="
          kubectl get pods -n crtracker -l app=crtracker,component=backend
          echo ""
          echo "=== Frontend Pods ==="
          kubectl get pods -n crtracker -l app=crtracker,component=frontend
          echo ""
          echo "=== Services ==="
          kubectl get svc -n crtracker
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n crtracker

      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=${{ env.KUBECONFIG_PATH }}
          echo "Deployment failed. Rolling back..."
          kubectl rollout undo deployment/backend -n crtracker || true
          kubectl rollout undo deployment/frontend -n crtracker || true

      # ============================================================
      # NOTIFICATION (OPTIONAL)
      # ============================================================
      - name: Deployment summary
        if: always()
        run: |
          echo "================================"
          echo "Deployment Summary"
          echo "================================"
          echo "Status: ${{ job.status }}"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Namespace: crtracker"
          echo "================================"
