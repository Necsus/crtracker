name: Build and Deploy App

on:
  workflow_dispatch:  # Déclenchement manuel
  push:
    branches:
      - recette
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'k8s/**'
      - '.github/workflows/deploy-app.yml'

env:
  GEEKOM_HOST: 100.108.255.93
  REGISTRY: registry.necsus.dev
  APP_NAME: crtracker
  NAMESPACE: crtracker

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.REGISTRY }}/${{ env.APP_NAME }}/frontend:${SHORT_SHA},${{ env.REGISTRY }}/${{ env.APP_NAME }}/frontend:latest" >> $GITHUB_OUTPUT
          echo "backend_tags=${{ env.REGISTRY }}/${{ env.APP_NAME }}/backend:${SHORT_SHA},${{ env.REGISTRY }}/${{ env.APP_NAME }}/backend:latest" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}/frontend:buildcache,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}/backend:buildcache,mode=max

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

  deploy:
    name: Deploy to K3s
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          sed -i "s/127.0.0.1/${{ env.GEEKOM_HOST }}/g" ~/.kube/config
          sed -i "s/localhost/${{ env.GEEKOM_HOST }}/g" ~/.kube/config

      - name: Create namespace
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create registry pull secret
        run: |
          kubectl create secret docker-registry registry-credentials \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ secrets.REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create DB admin secret
        run: |
          if [ -z "${{ secrets.POSTGRES_ADMIN_URL }}" ]; then
            echo "ERROR: POSTGRES_ADMIN_URL secret is not set!" >&2
            exit 1
          fi

          kubectl create secret generic ${{ env.APP_NAME }}-db-admin \
            --from-literal=POSTGRES_ADMIN_URL="${{ secrets.POSTGRES_ADMIN_URL }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "ERROR: DATABASE_URL secret is not set!" >&2
            exit 1
          fi
          if [ -z "${{ secrets.SECRET_KEY }}" ]; then
            echo "ERROR: SECRET_KEY secret is not set!" >&2
            echo "Generate with: openssl rand -base64 32" >&2
            exit 1
          fi

          kubectl create secret generic ${{ env.APP_NAME }}-backend-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=LLM_PROVIDER="${{ vars.LLM_PROVIDER || 'groq' }}" \
            --from-literal=LLM_MODEL="${{ vars.LLM_MODEL || 'llama-3.3-70b-versatile' }}" \
            --from-literal=DEBUG="${{ vars.DEBUG || 'false' }}" \
            --from-literal=ENVIRONMENT="production" \
            --from-literal=ALLOWED_ORIGINS='${{ vars.ALLOWED_ORIGINS }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Init application database
        run: |
          kubectl apply -f k8s/db-init-job.yaml

          kubectl wait --for=condition=complete --timeout=90s job/db-init -n ${{ env.NAMESPACE }} || true
          kubectl logs job/db-init -n ${{ env.NAMESPACE }} || true
          kubectl delete job/db-init -n ${{ env.NAMESPACE }} || true

      - name: Deploy backend
        run: |
          kubectl apply -f k8s/backend/
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.APP_NAME }}/backend:${{ needs.build-and-push.outputs.short_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/backend -n ${{ env.NAMESPACE }}

      - name: Deploy frontend
        run: |
          kubectl apply -f k8s/frontend/
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.APP_NAME }}/frontend:${{ needs.build-and-push.outputs.short_sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/frontend -n ${{ env.NAMESPACE }}

      - name: Deploy ingress
        run: |
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for deployments
        run: |
          if ! kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=5m; then
            echo "=== Backend rollout FAILED ==="
            kubectl get pods -n ${{ env.NAMESPACE }} -l component=backend
            kubectl describe pods -n ${{ env.NAMESPACE }} -l component=backend | tail -40
            exit 1
          fi
          if ! kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=5m; then
            echo "=== Frontend rollout FAILED ==="
            kubectl get pods -n ${{ env.NAMESPACE }} -l component=frontend
            kubectl describe pods -n ${{ env.NAMESPACE }} -l component=frontend | tail -40
            exit 1
          fi

      - name: Wait for certificates
        run: |
          echo "Waiting for certificates..."
          sleep 30
          kubectl get certificate -n ${{ env.NAMESPACE }}

      - name: Deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Frontend: https://${{ env.APP_NAME }}.necsus.dev"
          echo "Backend API: https://api-${{ env.APP_NAME }}.necsus.dev"
          echo ""
          echo "Pods:"
          kubectl get pods -n ${{ env.NAMESPACE }}
          echo ""
          echo "Services:"
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo ""
          echo "Ingress:"
          kubectl get ingress -n ${{ env.NAMESPACE }}
          echo ""
          echo "Certificates:"
          kubectl get certificate -n ${{ env.NAMESPACE }}
