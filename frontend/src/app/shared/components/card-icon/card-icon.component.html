<!-- Card Icon — Clash Royale Style -->
<div [ngClass]="cssClasses()" [attr.aria-label]="card().name + ' - ' + card().elixir + ' elixir'">

  <!-- Card frame -->
  <div class="card-icon__frame">

    <!-- Art area -->
    <div class="card-icon__art">
      @if (imageUrl()) {
      <img [src]="imageUrl()" [alt]="card().name" class="card-icon__image" />
      } @else {
      <div class="card-icon__placeholder">
        <span class="card-icon__initial">{{ initial() }}</span>
      </div>
      }
    </div>

    <!-- Name banner -->
    @if (size() !== 'sm') {
    <div class="card-icon__banner">
      <span class="card-icon__name">{{ card().name }}</span>
    </div>
    }

  </div>

  <!-- Elixir cost badge -->
  @if (showElixir()) {
  <div class="card-icon__elixir">
    <span class="card-icon__elixir-val">{{ card().elixir }}</span>
  </div>
  }

  <!-- Shine overlay on hover -->
  <div class="card-icon__shine" aria-hidden="true"></div>

</div>
