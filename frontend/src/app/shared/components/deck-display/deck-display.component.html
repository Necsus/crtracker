<!-- Deck Display -->
<div class="flex flex-col gap-3">

  @if (showMeta()) {
  <div
    class="flex justify-between items-center gap-2 px-3.5 py-2.5 rounded-lg bg-[#0c1e3a]/65 border border-[#f6c237]/15">
    <div class="min-w-0">
      <h3 class="font-black text-base text-white leading-tight truncate">{{ deck().name }}</h3>
      <span class="text-xs font-bold tracking-widest uppercase text-[#f6c237] opacity-80">{{ deck().archetype }}</span>
    </div>
    <div
      class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-[0.875rem] font-extrabold bg-[#b030e0]/20 border border-[#b030e0]/35 text-[#d070f0] flex-shrink-0">
      <span class="text-sm">💧</span>
      <span>{{ deck().avg_elixir.toFixed(1) }}</span>
    </div>
  </div>
  }

  <div class="flex flex-wrap gap-3.5 px-4 py-4 rounded-xl bg-[#060e1a]/45 border border-white/5"
    [class.cursor-pointer]="clickable()">
    @for (card of deck().cards; track card.id) {
    <app-card-icon [card]="card" [size]="cardSize()" />
    }
  </div>

</div>
