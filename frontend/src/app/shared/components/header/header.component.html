<!-- App Header — Clash Royale Theme -->
<header class="app-header sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

    <!-- Brand -->
    <div class="flex items-center gap-3">
      <span class="text-3xl select-none">⚔️</span>
      <div class="leading-none">
        <h1 class="text-xl font-black tracking-wide cr-title-gradient">CRTracker</h1>
        <p class="text-xs font-bold tracking-widest uppercase" style="color: #4a6a9c;">Strategy Assistant</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex gap-2">
      <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all"
        style="color: #7ba8d0;">
        <span>🏟️</span>
        <span>Decks</span>
      </a>
      <a routerLink="/players" routerLinkActive="nav-active"
        class="nav-link flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all"
        style="color: #7ba8d0;">
        <span>🏆</span>
        <span>Players</span>
      </a>
      <a routerLink="/battles" routerLinkActive="nav-active"
        class="nav-link flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all"
        style="color: #7ba8d0;">
        <span>⚔️</span>
        <span>Battles</span>
      </a>
      <a routerLink="/cards" routerLinkActive="nav-active"
        class="nav-link flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all"
        style="color: #7ba8d0;">
        <span>🃏</span>
        <span>Cards</span>
      </a>
      <a routerLink="/archetypes" routerLinkActive="nav-active"
        class="nav-link flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all"
        style="color: #7ba8d0;">
        <span>🏛️</span>
        <span>Archetypes</span>
      </a>
    </nav>

  </div>
</header>
