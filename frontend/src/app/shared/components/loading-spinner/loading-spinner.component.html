<!-- Loading Spinner -->
<div class="flex flex-col items-center justify-center gap-4 p-6" [class.fixed]="overlay()" [class.inset-0]="overlay()"
  [class.backdrop-blur-md]="overlay()" [style.background]="overlay() ? 'rgba(6,14,26,0.82)' : ''"
  [style.z-index]="overlay() ? '9999' : ''">

  <div class="spinner relative" [ngClass]="spinnerSizeClass()">
    <div class="spinner-ring"></div>
    <div class="spinner-ring"></div>
    <div class="spinner-ring"></div>
  </div>

  @if (message()) {
  <p class="text-xs font-bold tracking-widest text-[#4a6a8c] text-center">{{ message() }}</p>
  }

</div>
