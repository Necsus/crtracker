<!-- Matchup Card -->
<a [routerLink]="oracleLink()" (click)="clicked.emit(matchup().opponent_deck_id)"
  [attr.aria-label]="'View matchup vs ' + matchup().opponent_deck_name" class="flex items-center gap-3 px-3.5 py-2.5 rounded-lg no-underline cursor-pointer
         bg-[#0a162c]/60 border border-white/[.06] transition-all
         hover:bg-[#142a50]/70 hover:border-[#f6c237]/25">

  <!-- Opponent info -->
  <div class="min-w-0 flex-1">
    <h4 class="font-bold text-[0.85rem] text-[#d8e8ff] leading-snug mb-0.5 truncate">{{ matchup().opponent_deck_name }}
    </h4>
    <span class="text-[0.65rem] font-semibold uppercase tracking-widest text-[#7b96aa]">{{ matchup().opponent_archetype
      }}</span>
  </div>

  <!-- Winrate badge -->
  <div
    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full font-extrabold text-[0.8rem] whitespace-nowrap flex-shrink-0"
    [ngClass]="wrBadgeClasses()">
    <span class="text-[0.7em]">{{ winrateIcon() }}</span>
    <span style="line-height:1">{{ matchup().winrate.toFixed(1) }}%</span>
  </div>

  <!-- Top 1k / sample -->
  @if (showDetails()) {
  <div class="flex items-center gap-1.5 text-[0.65rem] font-semibold text-[#4a6a8c] whitespace-nowrap flex-shrink-0">
    <span>Top&nbsp;1k:</span>
    <span class="font-bold">{{ matchup().top_1000_winrate.toFixed(1) }}%</span>
    <span class="opacity-30">&bull;</span>
    <span>{{ formatSampleSize(matchup().sample_size) }}</span>
  </div>
  }

</a>
