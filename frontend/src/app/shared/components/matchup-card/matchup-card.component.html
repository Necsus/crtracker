<!-- Matchup Card Component -->
<a [routerLink]="oracleLink()" class="matchup-card" [class.matchup-card--clickable]="true"
  (click)="clicked.emit(matchup().opponent_deck_id)"
  [attr.aria-label]="'View matchup analysis vs ' + matchup().opponent_deck_name">

  <!-- Opponent Info -->
  <div class="matchup-card__opponent">
    <h4 class="matchup-card__name">{{ matchup().opponent_deck_name }}</h4>
    <span class="matchup-card__archetype">{{ matchup().opponent_archetype }}</span>
  </div>

  <!-- Winrate Display -->
  <div class="matchup-card__winrate" [class]="'matchup-card__winrate--' + winrateClass()">
    <span class="winrate__icon">{{ winrateIcon() }}</span>
    <span class="winrate__value">{{ matchup().winrate.toFixed(1) }}%</span>
  </div>

  <!-- Sample Size (if showing details) -->
  @if (showDetails()) {
  <div class="matchup-card__meta">
    <span class="meta__label">Top 1000:</span>
    <span class="meta__value">{{ matchup().top_1000_winrate.toFixed(1) }}%</span>
    <span class="meta__separator">•</span>
    <span class="meta__sample">{{ formatSampleSize(matchup().sample_size) }}</span>
  </div>
  }

</a>
