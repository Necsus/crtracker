<!-- Matchup Card — CR Style -->
<a [routerLink]="oracleLink()" class="matchup-card" (click)="clicked.emit(matchup().opponent_deck_id)"
  [attr.aria-label]="'View matchup vs ' + matchup().opponent_deck_name">

  <!-- Opponent info -->
  <div class="min-w-0 flex-1">
    <h4 class="matchup-card__name">{{ matchup().opponent_deck_name }}</h4>
    <span class="matchup-card__archetype">{{ matchup().opponent_archetype }}</span>
  </div>

  <!-- Winrate -->
  <div class="matchup-card__wr" [class]="'matchup-card__wr--' + winrateClass()">
    <span class="matchup-card__wr-icon">{{ winrateIcon() }}</span>
    <span class="matchup-card__wr-val">{{ matchup().winrate.toFixed(1) }}%</span>
  </div>

  <!-- Details -->
  @if (showDetails()) {
  <div class="matchup-card__meta">
    <span>Top&nbsp;1k:</span>
    <span class="font-bold">{{ matchup().top_1000_winrate.toFixed(1) }}%</span>
    <span class="opacity-30">•</span>
    <span>{{ formatSampleSize(matchup().sample_size) }}</span>
  </div>
  }

</a>
