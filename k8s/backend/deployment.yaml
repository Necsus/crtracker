# CRTracker Backend Deployment
# FastAPI application with Uvicorn server

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: crtracker
  labels:
    app: crtracker
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: crtracker
      component: backend
  template:
    metadata:
      labels:
        app: crtracker
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: registry-credentials

      containers:
        - name: backend
          image: registry.necsus.dev/crtracker/backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            # Application
            - name: APP_NAME
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: APP_NAME
            - name: APP_VERSION
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: APP_VERSION
            - name: ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: DEBUG

            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: DATABASE_URL
            - name: DATABASE_ECHO
              value: "false"

            # Security
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: SECRET_KEY
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "10080"

            # LLM Provider
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: OPENAI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: GROQ_API_KEY
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: LLM_PROVIDER
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: crtracker-secrets
                  key: LLM_MODEL

            # CORS
            - name: ALLOWED_ORIGINS
              value: "https://crtracker.necsus.dev,https://api-crtracker.necsus.dev"

          # Health Check
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Resources
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          # Security Context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false  # Set to true with tmpfs for production

      # Restart Policy
      restartPolicy: Always

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: crtracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
