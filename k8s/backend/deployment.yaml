---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: crtracker
  labels:
    app: crtracker
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: crtracker
      component: backend
  template:
    metadata:
      labels:
        app: crtracker
        component: backend
    spec:
      # Pull depuis le registry privé
      imagePullSecrets:
        - name: registry-credentials
      
      containers:
      - name: backend
        image: registry.necsus.dev/crtracker/backend:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        # Secrets (DATABASE_URL, SECRET_KEY, clés LLM)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: SECRET_KEY
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: GROQ_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: OPENAI_API_KEY
              optional: true

        # Configuration applicative (non sensible)
        - name: ENVIRONMENT
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: ENVIRONMENT
        - name: DEBUG
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: DEBUG
        - name: LLM_PROVIDER
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: LLM_PROVIDER
        - name: LLM_MODEL
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: LLM_MODEL

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
