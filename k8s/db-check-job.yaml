---
# Job simple pour vérifier la connectivité DB et laisser FastAPI créer ses tables
apiVersion: batch/v1
kind: Job
metadata:
  name: db-check
  namespace: crtracker
  labels:
    app: crtracker
    component: db-check
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: crtracker
        component: db-check
    spec:
      restartPolicy: Never
      containers:
      - name: db-check
        image: postgres:18-alpine
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: crtracker-backend-secrets
              key: DATABASE_URL
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Checking database connectivity ==="
          
          # Extraire les composants de l'URL de connexion
          DB_USER=$(echo $DATABASE_URL | sed 's/.*:\/\/\([^:]*\):.*/\1/')
          DB_PASS=$(echo $DATABASE_URL | sed 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/')
          DB_HOST=$(echo $DATABASE_URL | sed 's/.*@\([^:]*\):.*/\1/')
          DB_PORT=$(echo $DATABASE_URL | sed 's/.*:\([0-9]*\)\/.*/\1/')
          DB_NAME=$(echo $DATABASE_URL | sed 's/.*\/\([^?]*\).*/\1/')
          
          export PGUSER="$DB_USER"
          export PGPASSWORD="$DB_PASS"
          export PGHOST="$DB_HOST"
          export PGPORT="$DB_PORT"
          export PGDATABASE="$DB_NAME"
          
          # Tenter la connexion
          if psql -c "SELECT 1;" > /dev/null 2>&1; then
            echo "✅ Database connection successful!"
            echo "Database: $DB_NAME"
            echo "User: $DB_USER"
            echo "Host: $DB_HOST:$DB_PORT"
          else
            echo "❌ Database connection failed!"
            echo "FastAPI will handle table creation on first start."
          fi
          
          echo "=== DB check completed ==="
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"