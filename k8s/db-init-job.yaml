# CRTracker Database Initialization Job
# Runs Alembic migrations to setup database schema

apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: crtracker
  labels:
    app: crtracker
    component: db-init
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: crtracker
        component: db-init
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: alembic
          image: registry.necsus.dev/crtracker/backend:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Running Alembic migrations..."
              alembic upgrade head
              echo "Migrations completed successfully!"
          envFrom:
            - secretRef:
                name: crtracker-secrets

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
