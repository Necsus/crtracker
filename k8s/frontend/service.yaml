# CRTracker Frontend Service
# ClusterIP service for internal communication

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: crtracker
  labels:
    app: crtracker
    component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: crtracker
    component: frontend
