---
# Certificat SSL pour le frontend
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frontend-tls
  namespace: crtracker
spec:
  secretName: frontend-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - crtracker.necsus.dev
---
# Certificat SSL pour le backend
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: backend-tls
  namespace: crtracker
spec:
  secretName: backend-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api-crtracker.necsus.dev
---
# Ingress pour le frontend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: crtracker
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - crtracker.necsus.dev
    secretName: frontend-tls
  rules:
  - host: crtracker.necsus.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
# Ingress pour le backend API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: crtracker
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # CORS si nécessaire
    # traefik.ingress.kubernetes.io/router.middlewares: crtracker-cors@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - api-crtracker.necsus.dev
    secretName: backend-tls
  rules:
  - host: api-crtracker.necsus.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
