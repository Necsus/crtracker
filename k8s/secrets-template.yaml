# Template pour les secrets - NE PAS COMMITER avec de vraies valeurs
# Les secrets doivent être créés via GitHub Actions ou kubectl

---
# Secret pour pull depuis le registry privé
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: crtracker
type: kubernetes.io/dockerconfigjson
data:
  # Créé par le workflow GitHub Actions ou manuellement:
  # kubectl create secret docker-registry registry-credentials \
  #   --docker-server=registry.necsus.dev \
  #   --docker-username=<VOTRE_USERNAME> \
  #   --docker-password=<VOTRE_PASSWORD> \
  #   --namespace=crtracker
  .dockerconfigjson: <base64-encoded-docker-config>
---
# Secret pour les variables sensibles du backend
apiVersion: v1
kind: Secret
metadata:
  name: crtracker-backend-secrets
  namespace: crtracker
type: Opaque
stringData:
  # URL de connexion complète (utilisée par l'app FastAPI)
  # Cette URL doit pointer vers une DB et un user qui existent déjà
  DATABASE_URL: "postgresql+asyncpg://username:password@postgres.database.svc.cluster.local:5432/database_name"
  
  # Secret key pour FastAPI (JWT, sessions, etc.)
  SECRET_KEY: "your-super-secret-fastapi-key-change-me"
  
# Créer ce secret manuellement:
# kubectl create secret generic crtracker-backend-secrets \
#   --from-literal=DATABASE_URL="postgresql+asyncpg://user:pass@postgres.database.svc.cluster.local:5432/dbname" \
#   --from-literal=SECRET_KEY="$(openssl rand -base64 32)" \
#   --namespace=crtracker
---
# Secret pour l'init DB (compte admin PostgreSQL utilisé par db-init-job)
# REQUIS avant d'appliquer k8s/db-init-job.yaml
# L'URL doit être celle d'un superuser (ex: postgres) avec droits de CREATE ROLE / CREATE DATABASE
apiVersion: v1
kind: Secret
metadata:
  name: crtracker-db-admin
  namespace: crtracker
type: Opaque
stringData:
  POSTGRES_ADMIN_URL: "postgresql://postgres:adminpassword@postgres.database.svc.cluster.local:5432/postgres"

# Créer ce secret manuellement:
# kubectl create secret generic crtracker-db-admin \
#   --from-literal=POSTGRES_ADMIN_URL="postgresql://postgres:adminpassword@<host>:<port>/postgres" \
#   --namespace=crtracker
#
# Via GitHub Actions: ajouter le secret POSTGRES_ADMIN_URL dans les Settings > Secrets du dépôt.
