# CRTracker Kubernetes Secrets Template
# IMPORTANT: Fill in the actual values and apply to create secrets
# DO NOT commit actual secrets to version control

---
# Application Secrets (Database, LLM API keys, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: crtracker-backend-secrets
  namespace: crtracker
type: Opaque
stringData:
  # Database Connection
  DATABASE_URL: "postgresql+asyncpg://crtracker:CHANGE_ME_PASSWORD@postgres.database.svc.cluster.local:5432/crtracker_db"

  # Security
  SECRET_KEY: "CHANGE_ME_SECRET_KEY_MIN_32_CHARS"

  # LLM Provider Keys
  OPENAI_API_KEY: ""
  GROQ_API_KEY: ""
  LLM_PROVIDER: "groq"
  LLM_MODEL: "llama-3.3-70b-versatile"

  # Application Settings
  ENVIRONMENT: "production"
  DEBUG: "false"

---
# Docker Registry Credentials
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: crtracker
type: kubernetes.io/dockerconfigjson
data:
  # Replace with base64 encoded docker config.json
  # Run: cat ~/.docker/config.json | base64 -w 0
  .dockerconfigjson: BASE64_ENCODED_DOCKER_CONFIG
